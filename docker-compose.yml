services:
  redis:
    image: redis:7-alpine
    container_name: dujiao-next-redis
    restart: always
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dujiao-next-api:local
    container_name: dujiao-next-api
    restart: always
    depends_on:
      - redis
    ports:
      - "127.0.0.1:18080:8080"
    command: ["./dujiao-api", "-mode", "api"]
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./db:/app/db
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  worker:
    image: dujiao-next-api:local
    container_name: dujiao-next-worker
    restart: always
    depends_on:
      - redis
      - api
    command: ["./dujiao-api", "-mode", "worker"]
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./db:/app/db
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  user:
    build:
      context: /opt/dujiao-next-user
      dockerfile: Dockerfile
    image: dujiao-next-user:local
    container_name: dujiao-next-user
    restart: always
    depends_on:
      - api
    ports:
      - "127.0.0.1:18081:80"

  admin:
    build:
      context: /opt/dujiao-next-admin
      dockerfile: Dockerfile
    image: dujiao-next-admin:local
    container_name: dujiao-next-admin
    restart: always
    depends_on:
      - api
    ports:
      - "127.0.0.1:18082:80"

volumes:
  redis-data:
